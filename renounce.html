let allMessages = [];

function findStudents(){

const inputVal=document.getElementById('regNumbers').value.trim();
const resultsDiv=document.getElementById('results');

resultsDiv.innerHTML="";
allMessages=[];

if(inputVal===""){
resultsDiv.innerHTML='<div class="not-found">Please enter register numbers.</div>';
return;
}

const regList=inputVal.split(/[,\s]+/).filter(r=>r!=="");

let foundCount=0;
let notFoundList=[];

regList.forEach(regNo=>{

const student=studentsData.find(s=>s.regNo===regNo);

if(student){

const msg=`Hello ${student.name}
Your Hostel: ${student.gender} Hostel (${student.hostel})
Room Number: ${student.room}
Report to the reception immediately.`;

allMessages.push(msg);

const div=document.createElement('div');
div.className='result-item';

div.innerHTML=`
<span class="result-text">
<strong>${student.name}</strong><br>
${student.hostel} (${student.gender})<br>
${student.room}
</span>
`;

resultsDiv.appendChild(div);

foundCount++;

}else{
notFoundList.push(regNo);
}

});

if(foundCount>0){
const successDiv=document.createElement('div');
successDiv.className='success-msg';
successDiv.innerText=`✅ ${foundCount} student(s) found!`;
resultsDiv.prepend(successDiv);
}

if(notFoundList.length>0){
const errorDiv=document.createElement('div');
errorDiv.className='not-found';
errorDiv.innerText=`❌ Not found: ${notFoundList.join(', ')}`;
resultsDiv.appendChild(errorDiv);
}

}

function copyAllMessages(){

if(allMessages.length===0){
alert("No messages to copy!");
return;
}

const text=allMessages.join("\n\n");

const textarea=document.createElement("textarea");
textarea.value=text;
document.body.appendChild(textarea);

textarea.select();
document.execCommand("copy");

document.body.removeChild(textarea);

alert("All messages copied! Paste in WhatsApp.");

}
